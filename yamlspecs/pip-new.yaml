!include pip.yaml
---
- install:
    makeinstall: >
      export PIP3=`find $$python__PREFIX -name pip-\*-py3\*whl`;
      python $$PIP3/pip install --ignore-installed --root $(ROOT) --no-deps ../{{src_tarball}}

