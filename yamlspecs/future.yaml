!include common.yaml
---
- package: Future provides compatibility layer between Python 2 and Python 3
  name:  future
  version: "{{versions.future}}"
  hash: "{{versions.future_hash}}"
  vendor_source: https://files.pythonhosted.org/packages/{{hash}}/{{name}}-{{version }}.{{extension}}
  description: |
    Future {{version}} is the missing compatibility layer between Python 2 and 
    Python 3. It allows to use a single, clean Python 3.x-compatible codebase
    to support both Python 2 and Python 3 with minimal overhead
