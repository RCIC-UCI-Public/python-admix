!include common_wheel.yaml
---
- package: kiwisolver
  name: kiwisolver
  version: "{{versions.kiwisolver}}"
  hash: "{{versions.kiwisolver_hash}}"
  suffix: "{{versions.kiwisolver_suffix}}"
  description: >
    A fast implementation of the Cassowary constraint solver
  install:
    makeinstall: >
      pip3 install --force-reinstall --root $(ROOT) --no-deps {{src_tarball}}

# this file is a result of insanity due to the fact that the same package under all the same conditions 
# no longer builds now (for 3.10.2) from src tarball while it was building 2 months ago on the same server.
# this file is building the same version but from the wheel which works. 
