!include common.yaml
---
- package: Pygments
  name: pygments
  version: "{{versions.pygments}}"
  hash: "{{versions.pygments_hash}}"
  fname: "{{versions.pygments_fname}}"
  vendor_source:  https://files.pythonhosted.org/packages/{{hash}}/{{fname}}-{{version}}.{{extension}}
  src_dir: "{{fname}}-{{version}}"
  description: |
    Pygments {{version}} is a syntax highlighting package. See https://pygments.org/
