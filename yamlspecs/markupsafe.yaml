!include common.yaml
---
- package: markupsafe
  name: markupsafe
  fname: !ifeq "{{versions.python_family}},3.10,MarkupSafe,markupsafe"
  version: "{{versions.markupsafe}}"
  hash: "{{versions.markupsafe_hash}}"
  src_dir: "{{fname}}-{{version}}"
  vendor_source: https://files.pythonhosted.org/packages/{{hash}}/{{fname}}-{{version}}.{{extension}}
  description: |
    Safely add untrusted strings to HTML/XML markup
